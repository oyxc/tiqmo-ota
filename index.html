<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiqmo iOS 安装</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .install-btn {
            display: inline-block;
            background: #007AFF;
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 18px;
            margin: 20px 0;

        .info {

        .qr {

<body>
    <h1>🚀 Tiqmo iOS</h1>
    <div class="info">版本: 3.18.0</div>
    <div class="info">Build: 20260418142451</div>
    <div class="info">更新时间: 2026-04-18 21:52</div>
    
    <a href="itms-services://?action=download-manifest&url=https://oyxc.github.io/tiqmo-ota/manifest.plist" class="install-btn">
        📲 点击安装
    </a>
    
    <div class="qr">
        <p>或扫描二维码安装：</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=itms-services://?action=download-manifest%26url=https://oyxc.github.io/tiqmo-ota/manifest.plist" alt="安装二维码">

    <p style="color: #999; font-size: 14px;">
